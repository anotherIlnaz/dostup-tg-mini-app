name: Deploy TG Mini App Stage

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-miniapp-stage
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  STAGE_IMAGE_TAG: stage
  STAGE_URL: https://app-stage.dostup-vpn.ru

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      owner_lc: ${{ steps.vars.outputs.owner_lc }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Derive image coordinates
        id: vars
        shell: bash
        run: |
          echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push stage image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api-stage.dostup-vpn.ru
            VITE_APP_ENV=stage
            VITE_BASE_PATH=/
            VITE_ENABLE_DEV_LOGIN=false
            VITE_ALLOW_DEV_CODE_HINT=false
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/dostup-miniapp:${{ steps.vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/dostup-miniapp:${{ env.STAGE_IMAGE_TAG }}
          cache-from: type=gha,scope=miniapp-stage
          cache-to: type=gha,mode=max,scope=miniapp-stage

  deploy-stage:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: stage

    steps:
      - name: Trigger Dokploy redeploy
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.STAGE_DOKPLOY_MINIAPP_WEBHOOK }}
        run: |
          set -eu
          case "$WEBHOOK_URL" in
            http://*|https://*) ;;
            *)
              echo "STAGE_DOKPLOY_MINIAPP_WEBHOOK must contain a raw http(s) URL." >&2
              exit 1
              ;;
          esac
          curl -fsS -X POST "$WEBHOOK_URL"

      - name: Verify stage readiness
        shell: bash
        env:
          STAGE_URL: ${{ env.STAGE_URL }}
        run: |
          set -eu
          for attempt in $(seq 1 24); do
            if curl -fsS "$STAGE_URL" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Stage mini app check failed for $STAGE_URL" >&2
          exit 1
